<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Heart of Modu — Photo - Hongwei Li</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
    <style>
        html, body { scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="with-sidebar photo-viewer-page">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html">Hongwei Li</a>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html" class="sidebar-link active">Projects</a></li>
            <li><a href="../about.html" class="sidebar-link">About</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
    <section class="photo-viewer-section">
        <div class="photo-viewer-nav">
            <a href="2025-thom-gallery.html" class="back-link">Back to Gallery</a>
            <span class="photo-counter" id="photoCounter"></span>
        </div>

        <div class="photo-viewer-frame">
            <div class="photo-viewer-img-wrap">
                <img id="viewerImg" src="" alt="" class="photo-viewer-img">
            </div>
        </div>
    </section>
    </main>

    <script>
        const PROJECT_BASE = "../images/2025/the-heart-of-modu";

        const params = new URLSearchParams(window.location.search);
        let current = parseInt(params.get("index") || "0", 10);

        const img = document.getElementById("viewerImg");
        const counter = document.getElementById("photoCounter");
        let images = [];

        function alignCounter() {
            const wrap = document.querySelector(".photo-viewer-img-wrap");
            if (!wrap) return;
            const rect = wrap.getBoundingClientRect();
            const navRect = counter.parentElement.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2 - navRect.left;
            counter.style.left = centerX + "px";
        }

        function show(index) {
            if (!images.length) return;
            current = Math.max(0, Math.min(index, images.length - 1));
            img.src = images[current].src;
            img.alt = images[current].alt;
            counter.textContent = (current + 1) + " / " + images.length;
            const url = new URL(window.location);
            url.searchParams.set("index", current);
            window.history.replaceState({}, "", url);
            alignCounter();
        }

        window.addEventListener("resize", alignCounter);

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "PageUp") show(current - 1);
            if (e.key === "ArrowRight" || e.key === "PageDown") show(current + 1);
            if (e.key === "Escape") window.location.href = "2025-thom-gallery.html";
        });

        document.addEventListener("wheel", (e) => {
            e.preventDefault();
            if (e.deltaY > 0) show(current + 1);
            else if (e.deltaY < 0) show(current - 1);
        }, { passive: false });

        document.addEventListener("contextmenu", (e) => e.preventDefault());

        fetch(`${PROJECT_BASE}/project.json`)
            .then(r => r.json())
            .then(data => {
                const title = data.title || "";
                images = (data.thumbnails || []).map((filename, i) => ({
                    src: `${PROJECT_BASE}/${filename}`,
                    alt: `${title} ${i + 1}`
                }));
                if (isNaN(current) || current < 0 || current >= images.length) current = 0;
                show(current);
            });
    </script>
</body>
</html>
