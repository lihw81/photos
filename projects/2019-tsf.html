<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Hongwei Li</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body class="with-sidebar">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html">Hongwei Li</a>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html" class="sidebar-link active">Projects</a></li>
            <li><a href="../about.html" class="sidebar-link">About</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
    <section class="project-detail">
        <div class="container">
            <div class="back-to-projects">
                <a href="index.html" class="back-link">Back to Projects</a>
            </div>

            <div class="project-overview">
                <h1 id="project-title">
                    <span id="project-title-main"></span><br>
                    <span id="project-subtitle" style="font-size:0.6em;font-weight:300;"></span>
                </h1>

                <div class="project-statement">
                    <p id="project-statement"></p>
                </div>

                <div class="project-overview-actions">
                    <a href="2019-tsf-gallery.html" class="overview-action-link">All Photos →</a>
                </div>
            </div>
        </div>
    </section>
    </main>

    <script src="../js/main.js"></script>
    <script>
        fetch("../images/2019/the-shanghai-ferries/project.json")
            .then(res => res.json())
            .then(data => {
                const title = data.title || "";
                const subtitle = data.subtitle || "";
                const year = data.year || "";
                const statement = data.statement || "";

                document.title = (title ? title + (year ? ` (${year})` : "") : "Project") + " - Hongwei Li";
                document.getElementById("project-title-main").textContent = title + (year ? ` (${year})` : "");
                document.getElementById("project-subtitle").textContent = subtitle;
                document.getElementById("project-statement").textContent = statement;
            })
            .catch(err => console.error("Failed to load project.json:", err));
    </script>
</body>
</html>
