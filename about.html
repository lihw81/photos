<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Hongwei Li</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
</head>
<body class="with-sidebar">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-logo">
            <a href="projects/index.html">Hongwei Li</a>
        </div>
        <ul class="sidebar-menu">
            <li><a href="projects/index.html" class="sidebar-link">Projects</a></li>
            <li><a href="about.html" class="sidebar-link active">About</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- About Content -->
        <section class="project-detail">
            <div class="container">
                <div class="about-content">
                    <div class="about-text">
                        <h2>About Me(关于我）</h2>
                        <p id="about-bio"></p>
                    </div>
                    <hr class="section-divider">
                    <div class="about-text">
                        <h2>Exhibition and Awards(展览与获奖）</h2>
                        <ul id="awards-list"></ul>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="js/main.js"></script>
    <script>
        fetch('/info.json')
            .then(r => r.json())
            .then(data => {
                // Populate bio
                document.getElementById('about-bio').textContent = data.about.bio;

                // Populate exhibitions and awards
                const list = document.getElementById('awards-list');
                data.exhibitions_and_awards.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `${item.year} — <em>${item.title}</em>, ${item.type}, ${item.location}`;
                    list.appendChild(li);
                });
            });
    </script>
</body>
</html>
